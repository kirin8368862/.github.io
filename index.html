        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        
        /* --- 自訂動畫特效 --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-15px) rotate(-5deg); }
            40% { transform: translateX(15px) rotate(5deg); }
            60% { transform: translateX(-15px) rotate(-5deg); }
            80% { transform: translateX(15px) rotate(5deg); }
        }
        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes spin-slow {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 6s linear infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 全域音效引擎 ---
        const AudioEngine = (function() {
            let ctx = null;
            let unlocked = false;

            function init() {
                try {
                    if (!ctx) {
                        const Ctx = window.AudioContext || window.webkitAudioContext;
                        if (Ctx) ctx = new Ctx();
                    }
                    if (ctx && ctx.state === 'suspended') {
                        ctx.resume();
                    }
                    if (ctx && !unlocked) {
                        const buffer = ctx.createBuffer(1, 1, 22050);
                        const source = ctx.createBufferSource();
                        source.buffer = buffer;
                        source.connect(ctx.destination);
                        source.start(0);
                        unlocked = true;
                    }
                } catch(e) {
                    console.log('Audio init skipped', e);
                }
            }

            function playTone(freq, type, duration, vol=0.4) {
                try {
                    if (!ctx) return;
                    init();
                    const t = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch(e) {}
            }

            return {
                init,
                play(type) {
                    init();
                    if (type === 'correct') {
                        playTone(659.25, 'sine', 0.15, 0.4); 
                        setTimeout(() => playTone(1046.50, 'sine', 0.4, 0.5), 100); 
                    } else if (type === 'incorrect') {
                        playTone(250, 'sawtooth', 0.2, 0.4);
                        playTone(235, 'sawtooth', 0.2, 0.4); 
                        setTimeout(() => {
                            playTone(200, 'sawtooth', 0.3, 0.5);
                            playTone(185, 'sawtooth', 0.3, 0.5);
                        }, 180);
                    } else if (type === 'clear') {
                        playTone(523.25, 'sine', 0.15, 0.4); 
                        setTimeout(() => playTone(659.25, 'sine', 0.15, 0.4), 100); 
                        setTimeout(() => playTone(783.99, 'sine', 0.15, 0.4), 200); 
                        setTimeout(() => playTone(1046.50, 'sine', 0.15, 0.4), 300); 
                        
                        setTimeout(() => {
                            playTone(523.25, 'square', 0.8, 0.2);
                            playTone(659.25, 'square', 0.8, 0.2);
                            playTone(783.99, 'square', 0.8, 0.2);
                            playTone(1046.50, 'sine', 1.0, 0.5);
                        }, 400);
                    } else if (type === 'fail') {
                        playTone(329.63, 'triangle', 0.25, 0.4);
                        setTimeout(() => playTone(261.63, 'triangle', 0.5, 0.4), 250);
                    }
                }
            };
        })();

        // --- 字串模糊比對演算法 (專供口說容錯使用) ---
        const getLevenshteinDistance = (a, b) => {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i-1) === a.charAt(j-1)) {
                        matrix[i][j] = matrix[i-1][j-1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i-1][j-1] + 1, Math.min(matrix[i][j-1] + 1, matrix[i-1][j] + 1));
                    }
                }
            }
            return matrix[b.length][a.length];
        };

        const isFuzzyMatch = (spoken, target) => {
            const cleanSpoken = spoken.toLowerCase().replace(/[^a-z ]/g, '');
            const cleanTarget = target.toLowerCase().replace(/[^a-z ]/g, '');
            
            // 完全包含 (例如辨識出 "a apple"，目標是 "apple")
            if (cleanSpoken.includes(cleanTarget)) return true;

            const words = cleanSpoken.split(/\s+/);
            for (let w of words) {
                if (w === cleanTarget) return true;
                
                const dist = getLevenshteinDistance(w, cleanTarget);
                // 動態容錯門檻：單字越長，允許辨識錯誤的字母數越多 (相近音容錯)
                let threshold = 1; 
                if (cleanTarget.length >= 7) threshold = 3;
                else if (cleanTarget.length >= 4) threshold = 2;

                if (dist <= threshold) return true;
            }
            return false;
        };

        // --- 工具與解析函式 ---
        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const formatDate = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const getCalendarWeekDiff = (startStr, targetStr) => {
            const s = new Date(startStr); s.setHours(0,0,0,0);
            const t = new Date(targetStr); t.setHours(0,0,0,0);
            const sDay = s.getDay() || 7; s.setDate(s.getDate() - sDay + 1);
            const tDay = t.getDay() || 7; t.setDate(t.getDate() - tDay + 1);
            return Math.max(0, Math.round((t - s) / (1000 * 60 * 60 * 24 * 7)));
        };

        const getTestRecord = (record, mode) => {
            if (!record || record[mode] === undefined) return null;
            if (typeof record[mode] === 'number') {
                return { correct: record[mode] / 10, total: record[mode] / 10 }; 
            }
            return record[mode];
        };

        const REQUIRED_MODES = ['listening', 'dictation', 'speaking', 'dictation-en'];

        const getDayTotalScore = (record) => {
            if (!record) return 0;
            let totalCorrect = 0;
            let totalQuestions = 0;
            let completedCount = 0;
            
            REQUIRED_MODES.forEach(mode => {
                const res = getTestRecord(record, mode);
                if (res) {
                    totalCorrect += res.correct;
                    totalQuestions += res.total;
                    completedCount++;
                }
            });
            
            if (totalQuestions === 0) return 0;
            return Math.round((totalCorrect / totalQuestions) * (completedCount * 25));
        };

        // --- 主程式開始 ---
        function App() {
            const [appState, setAppState] = useState('setup');
            const [vocabLevel, setVocabLevel] = useState('elementary');
            const [startDate, setStartDate] = useState(formatDate(new Date())); 
            
            const [globalVocab, setGlobalVocab] = useState([]); 
            const [dailyRecords, setDailyRecords] = useState({}); 
            const [activeDateInfo, setActiveDateInfo] = useState(null); 
            const [activeWordsPool, setActiveWordsPool] = useState([]); 
            const [currentTestMode, setCurrentTestMode] = useState(null); 
            
            const [currentWords, setCurrentWords] = useState([]); 
            const [currentIndex, setCurrentIndex] = useState(0);
            
            const [initialWordCount, setInitialWordCount] = useState(0);
            const [firstPassCorrectCount, setFirstPassCorrectCount] = useState(0);
            const [isFirstPass, setIsFirstPass] = useState(true);

            const [feedback, setFeedback] = useState(null); 
            const [notification, setNotification] = useState('');
            const [wrongWords, setWrongWords] = useState([]);
            const [options, setOptions] = useState([]);
            const [userInput, setUserInput] = useState('');
            const [isRecording, setIsRecording] = useState(false);
            
            const [showBackup, setShowBackup] = useState(false);
            const [speechError, setSpeechError] = useState(false);

            const recognitionRef = useRef(null);
            const speakTimeoutRef = useRef(null);

            useEffect(() => {
                const unlockAudio = () => {
                    AudioEngine.init();
                    document.removeEventListener('click', unlockAudio);
                    document.removeEventListener('touchstart', unlockAudio);
                };
                document.addEventListener('click', unlockAudio, { once: true });
                document.addEventListener('touchstart', unlockAudio, { once: true });
                return () => {
                    document.removeEventListener('click', unlockAudio);
                    document.removeEventListener('touchstart', unlockAudio);
                };
            }, []);

            useEffect(() => {
                return () => {
                    if (speakTimeoutRef.current) clearTimeout(speakTimeoutRef.current);
                };
            }, []);

            useEffect(() => {
                const savedLevel = localStorage.getItem('wordMasterVocabLevel') || 'elementary';
                setVocabLevel(savedLevel);
                
                const suffix = savedLevel === 'junior' ? '_junior' : '';
                const savedStart = localStorage.getItem('wordMasterStartDate' + suffix);
                const savedRecords = localStorage.getItem('wordMasterDailyRecords' + suffix);
                const savedVocab = localStorage.getItem('wordMasterGlobalVocab' + suffix);
                
                const vocabStr = savedLevel === 'junior' ? JUNIOR_VOCAB_STRING : ELEMENTARY_VOCAB_STRING;
                const parsedVocab = vocabStr.split(',').map(pair => {
                    const [en, zh] = pair.split(':');
                    return { en, zh };
                });

                if (savedVocab) {
                    setGlobalVocab(JSON.parse(savedVocab));
                } else {
                    const shuffled = shuffleArray(parsedVocab);
                    setGlobalVocab(shuffled);
                    localStorage.setItem('wordMasterGlobalVocab' + suffix, JSON.stringify(shuffled));
                }

                if (savedRecords) setDailyRecords(JSON.parse(savedRecords));
                else setDailyRecords({});
                
                if (savedStart && savedStart !== "undefined" && savedStart !== "null") {
                    setStartDate(savedStart);
                    setAppState('calendar');
                } else {
                    setStartDate(formatDate(new Date()));
                    setAppState('setup');
                }
            }, []);

            const handleLevelChange = (newLevel) => {
                setVocabLevel(newLevel);
                const suffix = newLevel === 'junior' ? '_junior' : '';
                const savedStart = localStorage.getItem('wordMasterStartDate' + suffix);
                if (savedStart && savedStart !== "undefined" && savedStart !== "null") {
                    setStartDate(savedStart);
                } else {
                    setStartDate(formatDate(new Date()));
                }
            };

            const handleSetup = () => {
                const finalDate = startDate || formatDate(new Date());
                const isJunior = vocabLevel === 'junior';
                const suffix = isJunior ? '_junior' : '';

                const vocabStr = isJunior ? JUNIOR_VOCAB_STRING : ELEMENTARY_VOCAB_STRING;
                const parsedVocab = vocabStr.split(',').map(pair => {
                    const [en, zh] = pair.split(':');
                    return { en, zh };
                });

                localStorage.setItem('wordMasterVocabLevel', vocabLevel);
                localStorage.setItem('wordMasterStartDate' + suffix, finalDate);
                
                let currentVocab = [];
                const savedVocab = localStorage.getItem('wordMasterGlobalVocab' + suffix);
                if (savedVocab) {
                     currentVocab = JSON.parse(savedVocab);
                } else {
                     currentVocab = shuffleArray(parsedVocab);
                     localStorage.setItem('wordMasterGlobalVocab' + suffix, JSON.stringify(currentVocab));
                }
                setGlobalVocab(currentVocab);
                
                const savedRecords = localStorage.getItem('wordMasterDailyRecords' + suffix);
                setDailyRecords(savedRecords ? JSON.parse(savedRecords) : {});

                setStartDate(finalDate);
                setAppState('calendar');
                AudioEngine.init(); 
            };

            const getWordsForDate = (dateStr) => {
                if (!globalVocab.length) return [];
                const weekDiff = getCalendarWeekDiff(startDate, dateStr);
                const totalWeeks = Math.ceil(globalVocab.length / 100) || 1;
                
                const startIndex = ((weekDiff % totalWeeks) + totalWeeks) % totalWeeks * 100; 
                let weekWords = [];
                for(let i = 0; i < 100; i++) {
                    weekWords.push(globalVocab[(startIndex + i) % globalVocab.length]);
                }

                const targetDate = new Date(dateStr);
                const dayOfWeek = targetDate.getDay();

                if (dayOfWeek >= 1 && dayOfWeek <= 5) {
                    const index = dayOfWeek - 1; 
                    return weekWords.slice(index * 20, (index + 1) * 20);
                } else if (dayOfWeek === 6) {
                    return weekWords.filter((_, i) => i % 3 === 0).slice(0, 30);
                } else {
                    return weekWords.filter((_, i) => i % 3 === 1).slice(0, 30);
                }
            };

            const selectDayTask = (dateStr) => {
                const words = getWordsForDate(dateStr);
                setActiveDateInfo({ date: dateStr, isWeekend: new Date(dateStr).getDay() === 0 || new Date(dateStr).getDay() === 6 });
                setActiveWordsPool(words); 
                setAppState('review'); 
                setNotification('');
                AudioEngine.init();
            };

            const startGame = (mode) => {
                let testWords = [];
                
                if (mode === 'comprehensive') {
                    testWords = shuffleArray(dailyRecords[activeDateInfo.date].wrongWords || []);
                } else {
                    testWords = [...activeWordsPool];
                    if (activeDateInfo && !activeDateInfo.isWeekend) {
                        testWords = shuffleArray(testWords).slice(0, 15);
                    } else {
                        testWords = shuffleArray(testWords);
                    }
                }

                setCurrentWords(testWords);
                setCurrentIndex(0);
                
                setInitialWordCount(testWords.length);
                setFirstPassCorrectCount(0);
                setIsFirstPass(true);

                setFeedback(null);
                setWrongWords([]);
                setSpeechError(false); 
                setCurrentTestMode(mode);
                setAppState(mode);
                AudioEngine.init();
            };

            const speakWord = (word) => {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.8; 
                    window.speechSynthesis.speak(utterance);
                } else {
                    setNotification('您的瀏覽器不支援語音播放功能喔！');
                }
            };

            useEffect(() => {
                if ((appState === 'listening' || appState === 'comprehensive') && currentWords.length > 0 && !feedback) {
                    const correctWord = currentWords[currentIndex];
                    let wrongWordsList = shuffleArray(globalVocab.filter(w => w.en !== correctWord.en)).slice(0, 3);
                    const currentOptions = shuffleArray([correctWord, ...wrongWordsList]);
                    setOptions(currentOptions);
                    speakWord(correctWord.en);
                } else if ((appState === 'dictation-en' || appState === 'speaking' || appState === 'dictation') && currentWords.length > 0 && !feedback) {
                    if (appState === 'dictation-en') {
                        speakWord(currentWords[currentIndex].en);
                    }
                }
            }, [currentIndex, appState, currentWords, feedback, globalVocab]);

            const handleAnswer = (isCorrect) => {
                let updatedWrongWords = [...wrongWords];
                setSpeechError(false); 

                if (!isCorrect && currentTestMode === 'speaking') {
                    setTimeout(() => { speakWord(currentWords[currentIndex].en); }, 600); 
                }

                let newCorrectCount = firstPassCorrectCount;
                if (isCorrect && isFirstPass) {
                    newCorrectCount += 1;
                    setFirstPassCorrectCount(newCorrectCount);
                }

                if (!isCorrect && isFirstPass) {
                    if (activeDateInfo && currentTestMode !== 'comprehensive') {
                        const dateStr = activeDateInfo.date;
                        setDailyRecords(prev => {
                            const newRecords = { ...prev };
                            if (!newRecords[dateStr]) newRecords[dateStr] = {};
                            if (!newRecords[dateStr].wrongWords) newRecords[dateStr].wrongWords = [];
                            
                            const currentWordEn = currentWords[currentIndex].en;
                            if (!newRecords[dateStr].wrongWords.some(w => w.en === currentWordEn)) {
                                newRecords[dateStr].wrongWords.push(currentWords[currentIndex]);
                            }
                            const suffix = vocabLevel === 'junior' ? '_junior' : '';
                            localStorage.setItem('wordMasterDailyRecords' + suffix, JSON.stringify(newRecords));
                            return newRecords;
                        });
                    }
                }

                if (isCorrect) {
                    setFeedback('correct');
                    AudioEngine.play('correct'); 
                } else {
                    setFeedback('incorrect');
                    AudioEngine.play('incorrect'); 
                    const currentWord = currentWords[currentIndex];
                    if (!updatedWrongWords.some(w => w.en === currentWord.en)) {
                        updatedWrongWords.push(currentWord);
                        setWrongWords(updatedWrongWords);
                    }
                }
                
                setTimeout(() => {
                    if (currentIndex < currentWords.length - 1) {
                        setCurrentIndex(prev => prev + 1);
                        setFeedback(null);
                        setUserInput('');
                    } else {
                        if (updatedWrongWords.length > 0) {
                            AudioEngine.play('fail'); 
                            setNotification(`有 ${updatedWrongWords.length} 個單字需要再複習喔！加油！`);
                            setCurrentWords(shuffleArray(updatedWrongWords)); 
                            setCurrentIndex(0);
                            setWrongWords([]);
                            setIsFirstPass(false); 
                            setFeedback(null);
                            setUserInput('');
                        } else {
                            AudioEngine.play('clear'); 
                            
                            if (activeDateInfo) {
                                const dateStr = activeDateInfo.date;
                                setDailyRecords(prev => {
                                    const newRecords = { ...prev };
                                    if (!newRecords[dateStr]) newRecords[dateStr] = {};
                                    
                                    if (currentTestMode === 'comprehensive') {
                                        newRecords[dateStr].comprehensiveDone = true;
                                    } else if (currentTestMode) {
                                        const prevRecord = getTestRecord(newRecords[dateStr], currentTestMode);
                                        const prevCorrect = prevRecord ? prevRecord.correct : -1;
                                        if (newCorrectCount >= prevCorrect) {
                                            newRecords[dateStr][currentTestMode] = {
                                                correct: newCorrectCount,
                                                total: initialWordCount
                                            };
                                        }
                                    }
                                    
                                    const suffix = vocabLevel === 'junior' ? '_junior' : '';
                                    localStorage.setItem('wordMasterDailyRecords' + suffix, JSON.stringify(newRecords));
                                    return newRecords;
                                });
                            }
                            setAppState('result');
                            setFeedback(null);
                            setUserInput('');
                        }
                    }
                }, 2000);
            };

            const handleOptionSelect = (selectedWord) => {
                if (feedback) return;
                handleAnswer(selectedWord.en === currentWords[currentIndex].en);
            };

            // ★ 打字測驗：絕對精準比對 (無容錯)
            const handleDictationSubmit = (e) => {
                e.preventDefault();
                if (feedback || !userInput.trim()) return;
                
                // 100% 精準比對 (僅忽略大小寫與前後空白)
                const isCorrect = currentWords[currentIndex].en.toLowerCase() === userInput.trim().toLowerCase();
                handleAnswer(isCorrect);
            };

            // ★ 口說測驗：包含強大容錯處理
            const handleSpeak = () => {
                if (isRecording) {
                    if (recognitionRef.current) recognitionRef.current.stop();
                    if (speakTimeoutRef.current) clearTimeout(speakTimeoutRef.current);
                    setIsRecording(false);
                    return; 
                }

                if (window.isSecureContext === false) {
                    setNotification('⚠️ 安全限制：語音功能必須在「HTTPS 安全連線」下才能啟用！');
                    setSpeechError(true);
                    return;
                }
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    setNotification('❌ 瀏覽器不支援：建議使用 Chrome、Edge 或 Safari。');
                    setSpeechError(true);
                    return;
                }
                
                const recognition = new SpeechRecognition();
                recognitionRef.current = recognition;
                recognition.lang = 'en-US'; 
                recognition.interimResults = false;
                recognition.maxAlternatives = 5; // 取前 5 名可能辨識結果做交叉比對

                let hasHandledResult = false; 

                recognition.onstart = () => {
                    setIsRecording(true);
                    setSpeechError(false);
                    setNotification('🎤 錄音中... 說完請再次點擊麥克風結束。');

                    if (speakTimeoutRef.current) clearTimeout(speakTimeoutRef.current);
                    speakTimeoutRef.current = setTimeout(() => {
                        if (!hasHandledResult) {
                            hasHandledResult = true;
                            recognition.stop();
                            setIsRecording(false);
                            handleAnswer(false);
                            setNotification('⏳ 錄音超時！超過 10 秒未作答，判定為錯誤。');
                        }
                    }, 10000);
                };

                recognition.onresult = (event) => {
                    if (hasHandledResult) return;
                    hasHandledResult = true;
                    if (speakTimeoutRef.current) clearTimeout(speakTimeoutRef.current);

                    let matched = false;
                    let bestTranscript = "";
                    const correctAns = currentWords[currentIndex].en.toLowerCase();

                    // 掃描所有可能的辨識結果 (只要有一個中/相近，就算對！)
                    for (let i = 0; i < event.results[0].length; i++) {
                        const transcript = event.results[0][i].transcript;
                        if (i === 0) bestTranscript = transcript; 
                        
                        if (isFuzzyMatch(transcript, correctAns)) {
                            matched = true;
                            bestTranscript = transcript;
                            break;
                        }
                    }

                    if (matched) {
                        handleAnswer(true);
                        setNotification(`✅ 辨識成功: "${bestTranscript}"，非常標準！`);
                    } else {
                        handleAnswer(false);
                        setNotification(`❌ 你說了: "${bestTranscript}"，發音似乎不太對喔！`);
                    }
                };
                
                recognition.onerror = (event) => {
                    if (hasHandledResult) return;
                    hasHandledResult = true;
                    if (speakTimeoutRef.current) clearTimeout(speakTimeoutRef.current);

                    let errorMsg = `讀取失敗 (${event.error})`;
                    if (event.error === 'not-allowed') {
                        errorMsg = '麥克風未授權，或是瀏覽器因為安全考量強制封鎖了它。';
                    } else if (event.error === 'no-speech') {
                        handleAnswer(false);
                        setNotification('❌ 錄製已結束，未偵測到有效發音，判定為錯誤。');
                        setIsRecording(false);
                        setSpeechError(true);
                        return;
                    }
                    setNotification(`無法錄音：${errorMsg}`);
                    setIsRecording(false);
                    setSpeechError(true); 
                };
                
                recognition.onend = () => {
                    if (!hasHandledResult) {
                        hasHandledResult = true;
                        if (speakTimeoutRef.current) clearTimeout(speakTimeoutRef.current);
                        handleAnswer(false);
                        setNotification('❌ 錄製已結束，未偵測到有效發音，判定為錯誤。');
                    }
                    setIsRecording(false);
                };

                try {
                    recognition.start();
                } catch(e) {
                    setNotification('啟動麥克風時發生不明錯誤，請檢查裝置設定。');
                    setIsRecording(false);
                    setSpeechError(true);
                }
            };

            const handleCopyBackup = () => {
                const textarea = document.getElementById('backup-data');
                textarea.select();
                try {
                    document.execCommand('copy');
                    setNotification('✅ 備份代碼已複製！請妥善保存。');
                } catch(e) {
                    setNotification('請手動長按代碼全選並複製喔！');
                }
            };

            const handleRestoreBackup = () => {
                try {
                    const val = document.getElementById('backup-data').value;
                    const parsed = JSON.parse(val);
                    if (parsed.start && parsed.records) {
                        const restoredLevel = parsed.level || 'elementary';
                        const suffix = restoredLevel === 'junior' ? '_junior' : '';
                        
                        localStorage.setItem('wordMasterVocabLevel', restoredLevel);
                        localStorage.setItem('wordMasterStartDate' + suffix, parsed.start);
                        localStorage.setItem('wordMasterDailyRecords' + suffix, JSON.stringify(parsed.records));
                        
                        setVocabLevel(restoredLevel);
                        setStartDate(parsed.start);
                        setDailyRecords(parsed.records);
                        
                        const vocabStr = restoredLevel === 'junior' ? JUNIOR_VOCAB_STRING : ELEMENTARY_VOCAB_STRING;
                        const parsedVocab = vocabStr.split(',').map(pair => {
                            const [en, zh] = pair.split(':');
                            return { en, zh };
                        });

                        const savedVocab = localStorage.getItem('wordMasterGlobalVocab' + suffix);
                        if (savedVocab) {
                            setGlobalVocab(JSON.parse(savedVocab));
                        } else {
                            const shuffled = shuffleArray(parsedVocab);
                            setGlobalVocab(shuffled);
                            localStorage.setItem('wordMasterGlobalVocab' + suffix, JSON.stringify(shuffled));
                        }

                        setNotification(`✨ 還原成功！已為您切換至${restoredLevel === 'junior' ? '國中版' : '國小版'}並讀取紀錄！`);
                        setShowBackup(false);
                    } else {
                        throw new Error("格式錯誤");
                    }
                } catch(e) {
                    setNotification('❌ 還原失敗：代碼格式不正確！');
                }
            };

            const renderNotification = () => {
                if (!notification) return null;
                return (
                    <div className="fixed top-4 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:w-full md:max-w-md bg-white p-4 rounded-2xl shadow-xl border-2 border-yellow-400 flex items-center z-[100] animate-bounce">
                        <AlertCircle className="text-yellow-500 w-6 h-6 flex-shrink-0 mr-3" />
                        <div className="text-gray-700 font-bold text-sm sm:text-base leading-snug flex-1 break-words overflow-hidden">
                            {notification}
                        </div>
                        <button onClick={() => setNotification('')} className="ml-3 text-gray-400 hover:text-red-500 flex-shrink-0 bg-gray-100 rounded-full p-2 transition-colors">
                            <XCircle className="w-6 h-6" />
                        </button>
                    </div>
                );
            };

            const renderBackupModal = () => {
                if (!showBackup) return null;
                const currentData = JSON.stringify({
                    level: vocabLevel,
                    start: startDate,
                    records: dailyRecords
                });
                return (
                    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl relative animate-pop">
                            <h2 className="text-2xl font-black text-gray-800 mb-2 flex items-center">
                                💾 備份與還原 ({vocabLevel === 'junior' ? '國中版' : '國小版'})
                            </h2>
                            <p className="text-sm text-gray-500 mb-4 font-bold bg-yellow-50 p-2 rounded-lg border border-yellow-200">
                                紀錄保存在這台設備。若要更換設備，請複製代碼隨時貼上還原。
                            </p>
                            <textarea
                                id="backup-data"
                                className="w-full h-32 p-3 border-4 border-gray-100 rounded-xl mb-4 text-xs font-mono text-gray-600 focus:outline-none focus:border-green-400 transition-colors"
                                defaultValue={currentData}
                                placeholder="如果需要還原，請在此貼上您的備份代碼..."
                            />
                            <div className="flex space-x-3 mb-2">
                                <button onClick={handleCopyBackup} className="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md transition-all active:scale-95">
                                    複製備份
                                </button>
                                <button onClick={handleRestoreBackup} className="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl shadow-md transition-all active:scale-95">
                                    貼上還原
                                </button>
                            </div>
                            <button onClick={() => setShowBackup(false)} className="w-full mt-2 text-gray-400 hover:text-gray-600 font-bold py-2">
                                取消關閉
                            </button>
                        </div>
                    </div>
                );
            };

            const renderGameHeader = (title) => (
                <div className="flex justify-between items-center w-full mb-8 max-w-5xl">
                    <button onClick={() => setAppState('menu')} className="flex items-center space-x-2 bg-white/30 hover:bg-white/50 px-4 py-2 rounded-full text-white font-bold transition-colors">
                        <ArrowLeft className="w-5 h-5" />
                        <span>返回選單</span>
                    </button>
                    <div className="text-xl md:text-2xl font-bold text-white tracking-widest bg-black/20 px-6 py-2 rounded-full shadow-inner">
                        {title}
                    </div>
                    <div className="flex items-center space-x-2 bg-yellow-400 px-4 py-2 rounded-full text-yellow-900 font-black shadow-md">
                        <Trophy className="w-5 h-5" />
                        <span>答對 {firstPassCorrectCount} 題</span>
                    </div>
                </div>
            );

            const renderFeedback = () => {
                if (!feedback) return null;
                const isCorrect = feedback === 'correct';
                const correctWordEn = currentWords[currentIndex]?.en;
                const correctWordZh = currentWords[currentIndex]?.zh;
                
                return (
                    <div className={`absolute inset-0 flex items-center justify-center rounded-3xl z-10 bg-opacity-95 ${isCorrect ? 'bg-green-50' : 'bg-red-50'}`}>
                        <div className={`text-center transform scale-150 ${isCorrect ? 'animate-pop' : 'animate-shake'}`}>
                            {isCorrect ? (
                                <>
                                    <CheckCircle className="w-24 h-24 text-green-500 mx-auto mb-4" />
                                    <h2 className="text-4xl font-black text-green-600">太棒了！答對啦！</h2>
                                </>
                            ) : (
                                <>
                                    <XCircle className="w-24 h-24 text-red-500 mx-auto mb-4" />
                                    <h2 className="text-4xl font-black text-red-600">哎呀，差一點點！</h2>
                                    <p className="text-xl text-gray-600 mt-2 font-bold">正確答案是:</p>
                                    <p className="text-2xl text-blue-600 font-black mt-1">
                                        {correctWordEn} ({correctWordZh})
                                    </p>
                                </>
                            )}
                        </div>
                    </div>
                );
            };

            const renderSetup = () => (
                <div className="flex flex-col items-center bg-white p-10 rounded-3xl shadow-2xl max-w-md w-full text-center relative mt-4">
                    <CalendarIcon className="w-20 h-20 text-indigo-500 mb-4" />
                    <h2 className="text-3xl font-black text-gray-800 mb-2">設定學習起點</h2>
                    <p className="text-gray-500 font-medium mb-6">系統提供國小與國中雙版本題庫，紀錄將各自獨立儲存，請選擇您的挑戰！</p>
                    
                    <div className="w-full text-left mb-6">
                        <label className="block text-gray-700 font-bold mb-3 text-center">步驟一：選擇單字庫版本</label>
                        <div className="flex w-full space-x-2">
                            <button 
                                onClick={() => handleLevelChange('elementary')}
                                className={`flex-1 py-4 rounded-xl font-bold transition-all shadow-sm ${vocabLevel === 'elementary' ? 'bg-indigo-500 text-white shadow-md transform scale-105 border-2 border-indigo-600' : 'bg-gray-100 text-gray-500 hover:bg-gray-200 border-2 border-transparent'}`}
                            >
                                🎒 國小版<br/><span className="text-sm font-medium opacity-80">(1200字)</span>
                            </button>
                            <button 
                                onClick={() => handleLevelChange('junior')}
                                className={`flex-1 py-4 rounded-xl font-bold transition-all shadow-sm ${vocabLevel === 'junior' ? 'bg-indigo-500 text-white shadow-md transform scale-105 border-2 border-indigo-600' : 'bg-gray-100 text-gray-500 hover:bg-gray-200 border-2 border-transparent'}`}
                            >
                                🏫 國中版<br/><span className="text-sm font-medium opacity-80">(2000字)</span>
                            </button>
                        </div>
                    </div>

                    <div className="w-full text-left mb-8">
                        <label className="block text-gray-700 font-bold mb-3 text-center">步驟二：選擇打卡開始日期</label>
                        <input type="date" className="w-full border-4 border-indigo-100 rounded-2xl p-4 text-2xl font-bold text-gray-700 focus:border-indigo-400 focus:outline-none text-center"
                               onChange={(e) => setStartDate(e.target.value)} value={startDate || formatDate(new Date())} />
                    </div>

                    <button onClick={handleSetup}
                            className="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 rounded-2xl text-xl transition-all shadow-lg transform active:scale-95">
                        開始我的打卡挑戰！
                    </button>
                    
                    <button onClick={() => setShowBackup(true)} className="mt-4 text-indigo-400 font-bold hover:text-indigo-600 underline text-sm">
                        我有備份代碼，我要直接還原紀錄
                    </button>
                </div>
            );

            const renderCalendar = () => {
                const todayStr = formatDate(new Date());
                const todayObj = new Date(todayStr); 
                todayObj.setHours(0,0,0,0);
                
                const startObj = new Date(startDate);
                startObj.setHours(0,0,0,0);

                const daysArray = Array.from({ length: 30 }, (_, i) => {
                    const d = new Date(startObj);
                    d.setDate(d.getDate() + i);
                    return formatDate(d);
                });

                return (
                    <div className="flex flex-col items-center w-full max-w-5xl">
                        <div className="w-full flex justify-end space-x-2 mb-4">
                            <button onClick={() => setShowBackup(true)} className="text-white text-sm bg-green-500/90 hover:bg-green-600 px-4 py-2 rounded-full transition-colors font-bold shadow-md">
                                💾 備份與還原
                            </button>
                            <button onClick={() => setAppState('setup')} className="text-white text-sm bg-black/20 hover:bg-black/30 px-4 py-2 rounded-full transition-colors font-bold shadow-md">
                                ⚙️ 重新設定版本/日期
                            </button>
                        </div>
                        <div className="text-center space-y-4 mb-8">
                            <h1 className="text-4xl md:text-5xl font-extrabold text-white drop-shadow-lg tracking-wider">📅 30天學習挑戰地圖</h1>
                            <p className="text-xl text-indigo-100 font-medium">每天完成 4 項測驗才算挑戰成功！</p>
                            <p className="text-md text-indigo-200 font-medium bg-black/10 inline-block px-4 py-1 rounded-full border border-indigo-300">
                                目前版本：{vocabLevel === 'junior' ? '🏫 國中進階' : '🎒 國小基礎'} ({globalVocab.length} 字)
                            </p>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 w-full">
                            {daysArray.map((dateStr) => {
                                const dObj = new Date(dateStr);
                                const weekday = ['日', '一', '二', '三', '四', '五', '六'][dObj.getDay()];
                                const isWeekend = dObj.getDay() === 0 || dObj.getDay() === 6;
                                const isToday = dateStr === todayStr;
                                
                                dObj.setHours(0,0,0,0);
                                const isPast = dObj < todayObj;
                                const isFuture = dObj > todayObj;
                                
                                const record = dailyRecords[dateStr] || {};
                                const isTestsDone = REQUIRED_MODES.every(mode => getTestRecord(record, mode) !== null);
                                const isComprehensiveDone = !record.wrongWords || record.wrongWords.length === 0 || record.comprehensiveDone;
                                const isFullyCompleted = isTestsDone && isComprehensiveDone;

                                const totalDayScore = getDayTotalScore(record);

                                let cardClass = "";
                                if (isFullyCompleted) {
                                    cardClass = "bg-green-50 border-green-200 hover:bg-green-100";
                                } else if (isToday) {
                                    cardClass = "bg-white border-blue-300 shadow-xl ring-4 ring-blue-300 transform -translate-y-1";
                                } else if (isPast) {
                                    cardClass = "bg-red-50 border-red-200 hover:bg-red-100";
                                } else {
                                    cardClass = "bg-gray-50 border-gray-200 hover:bg-indigo-50";
                                }

                                return (
                                    <div key={dateStr} 
                                         onClick={() => { if (!isFullyCompleted || isToday || isFuture) selectDayTask(dateStr); }}
                                         className={`relative p-4 rounded-3xl border-b-8 flex flex-col items-center justify-between min-h-[160px] transition-all cursor-pointer hover:-translate-y-1 ${cardClass}`}>
                                        
                                        <div className={`font-bold mb-1 pointer-events-none ${isToday ? 'text-blue-600' : 'text-gray-500'}`}>
                                            {dateStr.slice(5)} (週{weekday})
                                        </div>

                                        {isFullyCompleted ? (
                                            <>
                                                <CalendarCheck className="w-10 h-10 text-green-500 my-1 pointer-events-none" />
                                                <span className="text-green-600 font-bold bg-green-100 px-3 py-1 rounded-full text-sm pointer-events-none">完美通關打卡</span>
                                                <span className="text-xs font-bold text-gray-500 mt-1 pointer-events-none">總分 {totalDayScore} / 100</span>
                                            </>
                                        ) : isToday ? (
                                            <>
                                                <BookOpen className="w-12 h-12 text-blue-500 my-2 animate-bounce pointer-events-none" />
                                                <button className="bg-blue-500 text-white font-bold py-2 px-4 rounded-xl w-full text-sm shadow-md pointer-events-none">
                                                    今日挑戰
                                                </button>
                                            </>
                                        ) : isPast ? (
                                            <>
                                                <CalendarX className="w-12 h-12 text-red-400 my-2 pointer-events-none" />
                                                <button className="bg-red-400 text-white font-bold py-2 px-4 rounded-xl w-full text-sm shadow-md pointer-events-none">
                                                    點此補測
                                                </button>
                                            </>
                                        ) : (
                                            <>
                                                <CalendarIcon className="w-12 h-12 text-gray-300 my-2 pointer-events-none" />
                                                <button className="bg-gray-400 text-white font-bold py-2 px-4 rounded-xl w-full text-sm shadow-sm pointer-events-none">
                                                    正常測驗
                                                </button>
                                            </>
                                        )}
                                        {isWeekend && !isFullyCompleted && <div className="absolute top-2 right-2 text-xs bg-purple-200 text-purple-700 px-2 py-1 rounded-full font-bold pointer-events-none">30 題</div>}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const renderReview = () => (
                <div className="flex flex-col items-center w-full max-w-4xl bg-white rounded-3xl shadow-2xl p-8">
                    <div className="flex w-full justify-start mb-2">
                        <button onClick={() => setAppState('calendar')} className="flex items-center text-indigo-500 hover:text-indigo-700 font-bold transition-colors">
                            <ArrowLeft className="w-5 h-5 mr-1" /> 返回日曆
                        </button>
                    </div>
                    <div className="flex items-center space-x-3 mb-6">
                        <BookOpen className="w-8 h-8 text-indigo-500" />
                        <h2 className="text-3xl font-black text-gray-800">測驗前，先來聽聽發音與複習！</h2>
                    </div>
                    <p className="text-lg text-gray-500 font-bold mb-6 bg-indigo-50 px-6 py-2 rounded-full border border-indigo-200">
                        日期：{activeDateInfo?.date} {activeDateInfo?.isWeekend ? '(假日隨機 30 題總測驗)' : '(平日複習 20 題，隨機測 15 題)'}
                    </p>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full mb-8 max-h-[50vh] overflow-y-auto p-4 bg-gray-50 rounded-2xl border-2 border-gray-100">
                        {activeWordsPool.map((w, idx) => (
                            <div key={idx} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between hover:border-indigo-300 transition-colors group">
                                <div className="flex flex-col text-left">
                                    <span className="text-xl font-bold text-gray-800">{w.en}</span>
                                    <span className="text-gray-500 font-medium mt-1">{w.zh}</span>
                                </div>
                                <button onClick={() => speakWord(w.en)} className="p-3 bg-indigo-50 text-indigo-500 rounded-full hover:bg-indigo-200 hover:text-indigo-700 transition-all active:scale-95" title="聽發音">
                                    <Volume2 className="w-6 h-6" />
                                </button>
                            </div>
                        ))}
                    </div>
                    <button onClick={() => setAppState('menu')} className="flex items-center justify-center bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 px-10 rounded-full text-xl transition-all shadow-lg transform active:scale-95">
                        我準備好了！進入測驗選單 <ArrowRight className="ml-2 w-6 h-6" />
                    </button>
                </div>
            );

            const renderMenu = () => {
                const todayRecord = activeDateInfo ? (dailyRecords[activeDateInfo.date] || {}) : {};
                const isAllTestsDone = REQUIRED_MODES.every(mode => getTestRecord(todayRecord, mode) !== null);
                const wrongWordsList = todayRecord.wrongWords || [];
                const needsComprehensive = isAllTestsDone && wrongWordsList.length > 0 && !todayRecord.comprehensiveDone;
                const fullyCompleted = isAllTestsDone && !needsComprehensive;
                
                const totalDayScore = getDayTotalScore(todayRecord);

                const renderMenuButton = (modeKey, icon, title, desc, borderClass, bgClass, hoverClass) => {
                    const testRec = getTestRecord(todayRecord, modeKey);
                    const isDone = testRec !== null;
                    const modeScore = isDone ? Math.round((testRec.correct / testRec.total) * 25) : 0;
                    return (
                        <button onClick={() => startGame(modeKey)} className={`group relative bg-white rounded-3xl p-8 shadow-xl hover:shadow-2xl transition-all transform hover:-translate-y-2 border-b-8 ${borderClass} ${isDone ? 'opacity-90' : ''}`}>
                            <div className={`absolute top-4 right-4 ${bgClass} rounded-full p-3 group-hover:${hoverClass} transition-colors`}>
                               {icon}
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2 mt-4 text-left">{title}</h2>
                            <p className="text-gray-500 text-left mb-4">{desc}</p>
                            {isDone && (
                                <div className="inline-block bg-green-100 text-green-700 font-bold px-4 py-1 rounded-full text-sm border border-green-200 mt-2">
                                   ✅ 已完成 (首答對 {testRec.correct}/{testRec.total} 題，得 {modeScore} 分)
                                </div>
                            )}
                        </button>
                    );
                };

                return (
                    <div className="flex flex-col items-center justify-center space-y-4 w-full">
                        <div className="w-full max-w-4xl px-4 flex justify-start">
                           <button onClick={() => setAppState('review')} className="flex items-center space-x-2 text-white hover:text-indigo-200 font-bold bg-white/20 px-4 py-2 rounded-full transition-colors">
                               <ArrowLeft className="w-5 h-5" />
                               <span>返回複習單字</span>
                           </button>
                        </div>
                        <div className="text-center space-y-2 mb-4">
                            <h2 className="text-3xl md:text-4xl font-extrabold text-white drop-shadow-lg tracking-wider">完成四項測驗，解鎖今日打卡</h2>
                        </div>
                        
                        {/* 綜合錯題測驗入口 */}
                        {needsComprehensive && (
                            <div className="w-full max-w-4xl bg-red-50 rounded-3xl p-6 text-center shadow-xl mb-4 border-4 border-red-300 animate-pulse">
                                <h3 className="text-2xl font-black mb-2 text-red-600">⚠️ 還有 {wrongWordsList.length} 個單字不太熟練！</h3>
                                <p className="text-lg text-gray-700 mb-4 font-bold">測驗雖然做完，但必須完成「綜合錯題練習」才能達到完美打卡標準。</p>
                                <button onClick={() => startGame('comprehensive')} className="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transform active:scale-95 transition-all text-xl">
                                    進入綜合錯題練習 <ArrowRight className="inline w-6 h-6 ml-2"/>
                                </button>
                            </div>
                        )}

                        {/* 完美通關提示 */}
                        {fullyCompleted && (
                            <div className="w-full max-w-4xl bg-yellow-400 rounded-3xl p-6 text-center shadow-xl mb-4 text-yellow-900 border-4 border-yellow-300 animate-bounce">
                               <h3 className="text-2xl font-black mb-1">🎉 太棒了！已完美完成今日所有任務！ 🎉</h3>
                               <p className="text-xl font-bold">今日總得分：{totalDayScore} 分 / 100 分</p>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl px-4">
                            {renderMenuButton('listening', <Volume2 className="w-8 h-8 text-blue-500" />, '聽力與中譯', '聽發音，選出正確的中文意思。', 'border-blue-200', 'bg-blue-100', 'bg-blue-200')}
                            {renderMenuButton('dictation', <span className="text-2xl font-black text-pink-500 font-serif">A</span>, '默寫與中翻英', '看中文，拼出正確的英文單字。', 'border-pink-200', 'bg-pink-100', 'bg-pink-200')}
                            {renderMenuButton('speaking', <Mic className="w-8 h-8 text-green-500" />, '口說挑戰', '對著麥克風大聲念出英文單字。', 'border-green-200', 'bg-green-100', 'bg-green-200')}
                            {renderMenuButton('dictation-en', <Headphones className="w-8 h-8 text-orange-500" />, '聽音默寫', '系統念出英文單字，請聽音拼寫出來。', 'border-orange-200', 'bg-orange-100', 'bg-orange-200')}
                        </div>
                    </div>
                );
            };

            const renderListeningMode = () => (
                <div className="flex flex-col items-center w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-8 relative overflow-hidden">
                    {renderFeedback()}
                    <div className="mb-4 text-blue-500 font-bold text-lg bg-blue-50 px-4 py-1 rounded-full">第 {currentIndex + 1} / {currentWords.length} 題</div>
                    <button onClick={() => speakWord(currentWords[currentIndex].en)} className="mb-8 bg-blue-100 hover:bg-blue-200 p-8 rounded-full shadow-md transform active:scale-95 transition-all mt-4">
                        <Volume2 className="w-16 h-16 text-blue-600" />
                    </button>
                    <p className="text-xl text-gray-500 font-bold mb-8">請聽發音，選出正確的中文意思</p>
                    <div className="grid grid-cols-2 gap-4 w-full">
                        {options.map((opt, i) => (
                            <button key={i} onClick={() => handleOptionSelect(opt)} disabled={feedback !== null} className="bg-gray-50 hover:bg-blue-50 border-2 border-gray-200 hover:border-blue-400 text-gray-700 text-2xl font-bold py-6 rounded-2xl transition-all transform hover:-translate-y-1 shadow-sm">
                                {opt.zh}
                            </button>
                        ))}
                    </div>
                </div>
            );

            const renderDictationMode = () => (
                <div className="flex flex-col items-center w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-8 relative overflow-hidden">
                    {renderFeedback()}
                    <div className="mb-4 text-pink-500 font-bold text-lg bg-pink-50 px-4 py-1 rounded-full">第 {currentIndex + 1} / {currentWords.length} 題</div>
                    <div className="text-center mb-8 mt-4">
                        <p className="text-gray-500 font-medium mb-2">請拼出正確的英文單字 <span className="text-pink-500">(需拼寫完全正確)</span></p>
                        <h3 className="text-5xl font-black text-gray-800 tracking-wide">{currentWords[currentIndex]?.zh}</h3>
                    </div>
                    <form onSubmit={handleDictationSubmit} className="w-full max-w-md flex flex-col space-y-4">
                        <input type="text" value={userInput} onChange={(e) => setUserInput(e.target.value)} disabled={feedback !== null} placeholder="輸入英文..." className="w-full px-6 py-4 text-3xl text-center font-bold text-gray-700 bg-gray-50 border-4 border-pink-200 rounded-2xl focus:outline-none focus:border-pink-500 transition-colors shadow-inner" autoFocus />
                        <button type="submit" disabled={feedback !== null || !userInput} className="w-full bg-pink-500 hover:bg-pink-600 disabled:bg-gray-300 text-white font-bold py-4 rounded-2xl text-2xl shadow-lg transform active:scale-95 transition-all flex justify-center items-center">
                            確定送出 <ArrowRight className="ml-2 w-6 h-6" />
                        </button>
                    </form>
                </div>
            );

            const renderDictationEnMode = () => (
                <div className="flex flex-col items-center w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-8 relative overflow-hidden">
                    {renderFeedback()}
                    <div className="mb-4 text-orange-500 font-bold text-lg bg-orange-50 px-4 py-1 rounded-full">第 {currentIndex + 1} / {currentWords.length} 題</div>
                    <button onClick={() => speakWord(currentWords[currentIndex].en)} className="mb-8 bg-orange-100 hover:bg-orange-200 p-8 rounded-full shadow-md transform active:scale-95 transition-all mt-4">
                        <Headphones className="w-16 h-16 text-orange-600" />
                    </button>
                    <div className="text-center mb-8">
                        <p className="text-gray-500 font-medium mb-2">請聽發音，默寫出正確的英文單字 <span className="text-orange-500">(需拼寫完全正確)</span></p>
                    </div>
                    <form onSubmit={handleDictationSubmit} className="w-full max-w-md flex flex-col space-y-4">
                        <input type="text" value={userInput} onChange={(e) => setUserInput(e.target.value)} disabled={feedback !== null} placeholder="輸入英文..." className="w-full px-6 py-4 text-3xl text-center font-bold text-gray-700 bg-gray-50 border-4 border-orange-200 rounded-2xl focus:outline-none focus:border-orange-500 transition-colors shadow-inner" autoFocus />
                        <button type="submit" disabled={feedback !== null || !userInput} className="w-full bg-orange-500 hover:bg-orange-600 disabled:bg-gray-300 text-white font-bold py-4 rounded-2xl text-2xl shadow-lg transform active:scale-95 transition-all flex justify-center items-center">
                            確定送出 <ArrowRight className="ml-2 w-6 h-6" />
                        </button>
                    </form>
                </div>
            );

            const renderSpeakingMode = () => (
                <div className="flex flex-col items-center w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-8 relative overflow-hidden">
                    {renderFeedback()}
                    <div className="mb-4 text-green-500 font-bold text-lg bg-green-50 px-4 py-1 rounded-full">第 {currentIndex + 1} / {currentWords.length} 題</div>
                    
                    <div className="flex items-center space-x-4 mb-2 mt-4">
                        <h3 className="text-6xl font-black text-gray-800 tracking-wide">{currentWords[currentIndex]?.en}</h3>
                    </div>
                    <p className="text-2xl text-gray-500 font-bold mb-10">{currentWords[currentIndex]?.zh}</p>
                    
                    <button onClick={handleSpeak} disabled={feedback !== null} className={`relative flex items-center justify-center w-40 h-40 rounded-full shadow-2xl transition-all transform active:scale-95 border-8 ${isRecording ? 'bg-red-500 border-red-300 animate-pulse' : 'bg-green-500 border-green-300 hover:bg-green-600'}`}>
                        <Mic className="w-20 h-20 text-white" />
                        {isRecording && <span className="absolute -bottom-8 text-red-500 font-bold whitespace-nowrap">點擊麥克風結束</span>}
                    </button>
                    {!isRecording && !feedback && <p className="mt-8 text-green-600 font-bold">點擊麥克風，念出上方的英文單字 <span className="text-gray-400 font-medium">(支援口音容錯)</span></p>}

                    {speechError && !feedback && (
                        <div className="mt-6 text-red-500 font-bold px-6 py-3 bg-red-50 rounded-full shadow-md animate-pop">
                            ⚠️ 發生錯誤：請確認麥克風已授權或網路正常，才能繼續破關喔！
                        </div>
                    )}
                </div>
            );

            const renderResult = () => {
                const record = dailyRecords[activeDateInfo?.date] || {};
                const isAllTestsDone = REQUIRED_MODES.every(mode => getTestRecord(record, mode) !== null);
                const wrongWordsList = record.wrongWords || [];
                const needsComprehensive = isAllTestsDone && wrongWordsList.length > 0 && !record.comprehensiveDone;
                const isFullyCompleted = isAllTestsDone && !needsComprehensive;
                
                const testScore = Math.round((firstPassCorrectCount / initialWordCount) * 25);

                return (
                    <div className="flex flex-col items-center w-full max-w-lg bg-white rounded-3xl shadow-2xl p-10 text-center relative overflow-hidden">
                        <div className="absolute top-1/2 left-1/2 w-[600px] h-[600px] bg-[radial-gradient(circle,rgba(255,215,0,0.3)_0%,transparent_60%)] animate-spin-slow pointer-events-none"></div>
                        
                        <div className="absolute top-10 left-10 text-4xl animate-float pointer-events-none">🎉</div>
                        <div className="absolute top-20 right-10 text-4xl animate-float-delayed pointer-events-none">✨</div>
                        <div className="absolute bottom-32 left-16 text-4xl animate-float-delayed pointer-events-none">🌟</div>
                        <div className="absolute bottom-20 right-20 text-4xl animate-float pointer-events-none">🏆</div>

                        <div className="mb-6 relative z-10 animate-pop">
                            <Trophy className="w-32 h-32 text-yellow-400 mx-auto filter drop-shadow-lg" />
                        </div>
                        <h2 className="text-5xl font-black text-gray-800 mb-2 z-10">
                            {currentTestMode === 'comprehensive' ? '錯題全擊破！' : '測驗完成！'}
                        </h2>
                        <p className="text-2xl text-blue-600 font-bold mb-2 z-10">第一次答對題數：<span className="text-yellow-500 text-3xl">{firstPassCorrectCount} / {initialWordCount}</span> 題</p>
                        
                        {currentTestMode !== 'comprehensive' && (
                            <p className="text-lg text-gray-500 font-bold mb-8 z-10 bg-gray-100 px-4 py-1 rounded-full inline-block">轉換單項積分：{testScore} / 25 分</p>
                        )}
                        
                        <div className="flex flex-col space-y-4 w-full z-10 mt-4">
                            {needsComprehensive ? (
                                <button onClick={() => setAppState('menu')} className="flex items-center justify-center bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-2xl text-xl transition-all shadow-md w-full transform hover:scale-105 animate-pulse">
                                    <AlertCircle className="mr-2 w-6 h-6" /> 前往最後一關：綜合錯題練習
                                </button>
                            ) : isFullyCompleted ? (
                                <button onClick={() => setAppState('calendar')} className="flex items-center justify-center bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-8 rounded-2xl text-xl transition-all shadow-md w-full transform hover:scale-105 animate-pulse">
                                    <CalendarCheck className="mr-2 w-6 h-6" /> 四項任務與複習全達成，回日曆
                                </button>
                            ) : (
                                <button onClick={() => setAppState('menu')} className="flex items-center justify-center bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-2xl text-xl transition-all shadow-md w-full transform hover:scale-105">
                                    <ArrowLeft className="mr-2 w-6 h-6" /> 返回測驗選單
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            const bgColors = {
                setup: 'from-gray-100 to-indigo-200',
                calendar: 'from-indigo-400 to-purple-500',
                review: 'from-blue-100 to-indigo-200',
                menu: 'from-blue-400 to-indigo-500',
                listening: 'from-blue-400 to-cyan-400',
                'dictation-en': 'from-orange-400 to-amber-500',
                dictation: 'from-pink-400 to-rose-400',
                speaking: 'from-green-400 to-emerald-500',
                comprehensive: 'from-red-400 to-rose-500',
                result: 'from-yellow-400 to-orange-400',
            };

            return (
                <div className={`min-h-screen bg-gradient-to-br ${bgColors[appState]} p-6 font-sans flex flex-col items-center transition-colors duration-500`}>
                    {renderNotification()}
                    {renderBackupModal()}
                    
                    <div className="w-full max-w-6xl flex-1 flex flex-col items-center justify-center">
                        {['listening', 'dictation-en', 'dictation', 'speaking', 'comprehensive'].includes(appState) && 
                            renderGameHeader(
                                appState === 'listening' ? '聽力與中譯' : 
                                appState === 'dictation-en' ? '聽音默寫' : 
                                appState === 'dictation' ? '默寫與中翻英' : 
                                appState === 'comprehensive' ? '綜合錯題練習' : '口說挑戰'
                            )
                        }
                        
                        {appState === 'setup' && renderSetup()}
                        {appState === 'calendar' && renderCalendar()}
                        {appState === 'review' && renderReview()}
                        {appState === 'menu' && renderMenu()}
                        
                        {(appState === 'listening' || appState === 'comprehensive') && renderListeningMode()}
                        
                        {appState === 'dictation-en' && renderDictationEnMode()}
                        {appState === 'dictation' && renderDictationMode()}
                        {appState === 'speaking' && renderSpeakingMode()}
                        {appState === 'result' && renderResult()}
                    </div>

                    <div className="mt-8 text-white/80 text-sm font-medium tracking-wider shadow-sm px-4 py-2 bg-black/10 rounded-full">
                        妳必須努力，才能看起來毫不費力。
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
